# Fly.io deployment config for the FastAPI backend.
# Run from the repo root:
#   fly launch --no-deploy --copy-config --name <your-app-name>
#   fly secrets set DATABASE_URL=... MODELS_BUCKET=... S3_ENDPOINT_URL=... \
#                   AWS_ACCESS_KEY_ID=... AWS_SECRET_ACCESS_KEY=... \
#                   FRONTEND_URL=https://your-frontend.vercel.app
#   fly deploy

app = "ai-digital-twin-backend"
primary_region = "syd"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  TF_CPP_MIN_LOG_LEVEL = "3"
  AWS_REGION = "auto"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout  = "5s"
    grace_period = "60s"
    method   = "GET"
    path     = "/status"

[[vm]]
  cpu_kind = "shared"
  cpus     = 2
  memory   = "4gb"   # TensorFlow + loaded models need headroom
